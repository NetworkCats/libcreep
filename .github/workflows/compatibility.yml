name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:unit
      - run: npm exec -c 'publint'
      - run: npm exec -c 'attw --pack --profile esm-only'

  browser:
    name: Browser / ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm exec -c 'playwright install --with-deps ${{ matrix.browser }}'
      - run: npm run test:browser -- --browser.name=${{ matrix.browser }}
