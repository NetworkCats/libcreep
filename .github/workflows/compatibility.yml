name: Compatibility

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:unit
      - run: npm run test:node-compat
      - run: npm run test:types:consumer
      - run: npx publint
      - run: npx attw --pack --profile esm-only

  browser:
    name: Browser / ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npm run test:browser -- --browser.name=${{ matrix.browser }}

  node:
    name: Node.js ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22.12.0, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:unit
      - run: npm run test:node-compat

  typescript:
    name: TypeScript ${{ matrix.typescript }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        typescript: [5.9.3, 6.0.2, 7.0.2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx --yes --package typescript@${{ matrix.typescript }} tsc -p test/compatibility/tsconfig.json
